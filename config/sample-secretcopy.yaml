apiVersion: v1
kind: Namespace
metadata:
  name: team-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
---
apiVersion: v1
kind: Secret
metadata:
  name: db-password
  namespace: team-a
type: Opaque
data:
  password: czNjcjN0
---
# Replace SOURCE_SECRET_UID with:
# kubectl get secret db-password -n team-a -o jsonpath='{.metadata.uid}'
apiVersion: twinward.io/v1alpha1
kind: SecretCopy
metadata:
  name: team-a-db-password-to-team-b
spec:
  source:
    namespace: team-a
    name: db-password
    uid: SOURCE_SECRET_UID
  target:
    namespace: team-b
    name: db-password-copy
