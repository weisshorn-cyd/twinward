apiVersion: v1
kind: Namespace
metadata:
  name: twinward-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: twinward
  namespace: twinward-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: twinward
rules:
  - apiGroups: ["twinward.io"]
    resources: ["secretcopies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["twinward.io"]
    resources: ["secretcopies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: twinward
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: twinward
subjects:
  - kind: ServiceAccount
    name: twinward
    namespace: twinward-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twinward
  namespace: twinward-system
  labels:
    app.kubernetes.io/name: twinward
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: twinward
  template:
    metadata:
      labels:
        app.kubernetes.io/name: twinward
    spec:
      serviceAccountName: twinward
      containers:
        - name: manager
          image: ghcr.io/twinward/twinward:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect
          env:
            - name: ALLOWED_NAMESPACES
              value: "*"
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: twinward-metrics
  namespace: twinward-system
  labels:
    app.kubernetes.io/name: twinward
spec:
  selector:
    app.kubernetes.io/name: twinward
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
